<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Linear Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080c" />
      <stop offset="100%" stop-color="#121218" />
    </linearGradient>

    <!-- Neon Glowing Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#9d4edd" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#222" stroke-width="6" />

  <!-- Glowing orbit rings -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#neonGrad)" stroke-width="4" stroke-dasharray="10, 15" opacity="0.3" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#neonGrad)" stroke-width="2" opacity="0.15" />

  <!-- Headphones and wave art -->
  <g filter="url(#glow)">
    <!-- Arch of headphones -->
    <path d="M 136 260 A 120 120 0 0 1 376 260" fill="none" stroke="url(#neonGrad)" stroke-width="16" stroke-linecap="round" />

    <!-- Left Cup -->
    <rect x="110" y="240" width="36" height="70" rx="18" fill="url(#neonGrad)" />

    <!-- Right Cup -->
    <rect x="366" y="240" width="36" height="70" rx="18" fill="url(#neonGrad)" />

    <!-- Symmetrical music waves in center -->
    <line x1="200" y1="210" x2="200" y2="310" stroke="#00f2fe" stroke-width="10" stroke-linecap="round" />
    <line x1="228" y1="180" x2="228" y2="340" stroke="#00f2fe" stroke-width="10" stroke-linecap="round" />
    <line x1="256" y1="160" x2="256" y2="360" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <line x1="284" y1="180" x2="284" y2="340" stroke="#9d4edd" stroke-width="10" stroke-linecap="round" />
    <line x1="312" y1="210" x2="312" y2="310" stroke="#9d4edd" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>